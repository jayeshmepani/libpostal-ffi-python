name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag name to publish
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install build dependencies
        run: python -m pip install --upgrade pip build twine
        
      - name: Download all prebuilt binaries from Release
        uses: robinraju/release-downloader@v1.11
        with:
          repository: "jayeshmepani/libpostal-ffi-python"
          tag: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          fileName: "*"
          out-file_path: "temp_binaries"

      - name: Structure and Extract Binaries
        run: |
          mkdir -p postalkit/libs/linux-x64
          mkdir -p postalkit/libs/linux-arm64
          mkdir -p postalkit/libs/macos-x64
          mkdir -p postalkit/libs/macos-arm64
          mkdir -p postalkit/libs/windows-x64
          
          # Extract each archive into its specific folder
          tar -xzf temp_binaries/libpostal-linux-x64.tar.gz -C postalkit/libs/linux-x64
          tar -xzf temp_binaries/libpostal-linux-arm64.tar.gz -C postalkit/libs/linux-arm64
          tar -xzf temp_binaries/libpostal-macos-x64.tar.gz -C postalkit/libs/macos-x64
          tar -xzf temp_binaries/libpostal-macos-arm64.tar.gz -C postalkit/libs/macos-arm64
          unzip temp_binaries/libpostal-windows-x64.zip -d postalkit/libs/windows-x64

      - name: Build Python Package (Bundled)
        run: python -m build
        
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

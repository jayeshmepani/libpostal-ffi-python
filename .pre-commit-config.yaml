repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff          # Lint
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format   # Format
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: npx pyright
        language: node
        types: [python]
        pass_filenames: false
        additional_dependencies: ['pyright']
